name: Build Linux .deb Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build FolderFlow .deb on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Prepare fake credentials.json
        run: |
          echo '{"installed":{"client_id":"fake","project_id":"fake","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_secret":"fake","redirect_uris":["http://localhost"]}}' > credentials.json

      - name: Build Linux executable
        run: |
          pyinstaller --noconfirm \
              --onefile \
              --windowed \
              --name "FolderFlow" \
              --icon=folderFlow-icon.png \
              --add-data "folderFlow-icon.png:." \
              --add-data "credentials.json:." \
              --hidden-import "PyQt6.sip" \
              --hidden-import "PyQt6.QtCore" \
              --hidden-import "PyQt6.QtGui" \
              --hidden-import "PyQt6.QtWidgets" \
              --hidden-import "google.auth.transport.requests" \
              --hidden-import "google.oauth2.credentials" \
              --hidden-import "google_auth_oauthlib.flow" \
              --hidden-import "googleapiclient.discovery" \
              --hidden-import "googleapiclient._helpers" \
              --hidden-import "googleapiclient.http" \
              --hidden-import "src.paths" \
              --hidden-import "src.config" \
              --hidden-import "src.auth" \
              --hidden-import "src.engine" \
              --hidden-import "src.scheduler" \
              --hidden-import "src.tracker" \
              --collect-all "PyQt6" \
              --collect-all "google_auth_oauthlib" \
              --collect-all "googleapiclient" \
              --collect-all "google.auth" \
              main.py

      - name: Build .deb package
        run: |
          bash packaging/build_deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolderFlow-Debian
          path: dist/*.deb
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
